      {
        "eventType": "NEW_HIRE"
      }
    invalidOnly: [ "eventType" ]

  'Update - subunitIds not array':
    userId: 1
    services: { }
    attributes:
      id: 1
    query: [ ]
    body:
      {
        "subunitIds": "1"
      }
    invalidOnly: [ "subunitIds" ]

  # Partial-update semantics (empty body is accepted) are exercised at the
  # service layer — see WorkspaceNotificationRegistrationService::applyPayload. Running it at
  # the API layer would require a persisted registration row + encryption-key
  # setup to fully execute update(), which is out of scope for param-rule tests.

