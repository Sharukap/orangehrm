  1: { id: 2, name: 'Engineering',  unitId: 'eng',     description: 'engineering', lft: 2, rgt: 3, level: 1 }
  2: { id: 3, name: 'People Ops',   unitId: 'po',      description: 'people ops',  lft: 4, rgt: 5, level: 1 }
